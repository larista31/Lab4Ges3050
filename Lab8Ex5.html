<html>
  <head>
    <style>
      body {background-color: black;
        margin: 0; 
        overflow: hidden; 
      }
      .node circle {
        stroke: #3a403d;
        stroke-width: .5px;
      }
      .node circle:hover{
        stroke-width: 3px !important;
        opacity: 1 !important;
      }
      #header {
          margin: auto;
          width: 50%;
          text-align: center;
      }
      h1 {
background-color: white;
          margin: auto;
          padding: 10px 0 0 0;
          font: bold 25px Verdana;
      }
      h2 {background-color: white;
          margin: 5px 15px 10px 20px;
          padding: 0;
          font: bold 16px Verdana;
      }
      p {background-color: white;
          margin: 0 15px 15px 20px;
          padding: 0;
          font-family: Verdana;
      }
    </style>
  </head>
  <body>
      
<div id="header">
    <h1>D3 Bubble Chart with Force Packing</h1>
    <p>Average Households that Own Cats (2016)</p>     
</div>
      
<div id="my_dataviz"></div>
      
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script>
    var width = window.innerWidth, height = window.innerHeight, nodePadding = 2.5;

    var svg = d3.select("#my_dataviz")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    var color = d3.scaleOrdinal(d3.schemeCategory20);
    
    // Declare simulation globally so the drag functions at the bottom can use it
    var simulation; 

    d3.csv("https://raw.githubusercontent.com/larista31/Lab4Ges3050/refs/heads/main/pet-ownership-statistics-by-state-2026%201.csv", types, function(error, graph){
      if (error) throw error;

      // Sort the nodes so that the bigger ones are drawn at the back
      graph = graph.sort(function(a,b){ return b.size - a.size; });

      // Create a tooltip
      var Tooltip = d3.select("body") // Attach to body to ensure absolute positioning works correctly
        .append("div")
        .style("opacity", 0)
        .attr("class", "tooltip")
        .style("background-color", "white")
        .style("border", "solid")
        .style("border-width", "2px")
        .style("border-radius", "5px")
        .style("padding", "5px")
        .style("position", "absolute")
        .style("pointer-events", "none"); // Prevents the tooltip from interfering with hover
      
      var mouseover = function(d) {
        Tooltip.style("opacity", 1)
      }

      var mousemove = function(d) {
        Tooltip
          .html("<h2>" + d.state + "</h2><p>" + d3.format(".1f")(d.HouseholdsThatOwnCats_2016) + "%</p>")
          .style("left", (d3.event.pageX + 20) + "px") // d3.event.pageX is safer than d3.mouse for tooltips
          .style("top", (d3.event.pageY + 20) + "px")
      }

      var mouseleave = function(d) {
        Tooltip.style("opacity", 0)
      }       
        
      // 1. DRAW THE CIRCLES FIRST
      var node = svg.append("g")
          .attr("class", "node")
        .selectAll("circle")
        .data(graph)
        .enter().append("circle")
          .attr("r", function(d) { return d.radius; })
          .attr("fill", function(d) { return color(d.state); })
          // Set initial starting coordinates in the middle of the screen
          .attr("cx", width / 2)
          .attr("cy", height / 2)
          .on("mouseover", mouseover) 
          .on("mousemove", mousemove)
          .on("mouseleave", mouseleave)
          .call(d3.drag()
              .on("start", dragstarted)
              .on("drag", dragged)
              .on("end", dragended));

      // 2. START THE SIMULATION SECOND (Now it has data and drawn circles to work with)
      simulation = d3.forceSimulation()
          .nodes(graph)
          .force("forceX", d3.forceX().strength(.1).x(width * .5))
          .force("forceY", d3.forceY().strength(.1).y(height * .5))
          .force("center", d3.forceCenter().x(width * .5).y(height * .5))
          .force("charge", d3.forceManyBody().strength(-15))
          .force("collide", d3.forceCollide().strength(.5).radius(function(d){ return d.radius + nodePadding; }).iterations(1))
          .on("tick", function(d){
            // Update circle positions on every frame
            node
                .attr("cx", function(d){ return d.x; })
                .attr("cy", function(d){ return d.y; })
          });
    });
    
    // Drag functions
    function dragstarted(d) {
      if (!d3.event.active) simulation.alphaTarget(.03).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(d) {
      d.fx = d3.event.x;
      d.fy = d3.event.y;
    }

    function dragended(d) {
      if (!d3.event.active) simulation.alphaTarget(.03);
      d.fx = null;
      d.fy = null;
    }

    // Type casting function
    function types(d){
      d.pop2020 = +d.HouseholdsThatOwnCats_2016;
      d.size = +d.HouseholdsThatOwnCats_2016 * 2;
      d.radius = d.size;
      return d;
    }
    </script>
  </body>
</html>
